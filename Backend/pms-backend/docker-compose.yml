services:
  db:
    image: postgres:15
    container_name: pms_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pms}
      POSTGRES_DB: ${POSTGRES_DB:-pms}
    ports:
      - "5432:5432"
    volumes:
      - pms_db_data:/var/lib/postgresql/data

volumes:
  pms_db_data:
