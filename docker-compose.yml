services:
  backend:
    build:
      context: ./PMS centralizado/Backend/pms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      GESTOR_EMAIL: ${GESTOR_EMAIL}
      GESTOR_PASSWORD: ${GESTOR_PASSWORD}
      GESTOR_NAME: ${GESTOR_NAME:-Gestor SaaS}
      GESTOR_SYSTEM_HOTEL_NAME: ${GESTOR_SYSTEM_HOTEL_NAME:-Hotel PMS}
      MICROFACTURA_URL: ${MICROFACTURA_URL:-}
      MICROFACTURA_API_KEY: ${MICROFACTURA_API_KEY:-}
      FORMINFO_API_KEY: ${FORMINFO_API_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./PMS centralizado/Frontend/pms-frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
